{% extends "templates/login.html" %}
{% block login %}
<div class='container iotlab'>
    <div class='logo'>
        <img id='iotlab-logo' src='https://www.iot-lab.info/assets/images/slices-ri_black.png' alt='Slices IoT logo'>
    </div>
    <div class='welcome'>
        <h2>Welcome to the Slices IoT JupyterHub!</h2>
        <p>Use your Slices IoT credentials to login.</p>
        <p>You can create an account <a href="https://www.iot-lab.info/testbed/signup">here</a>.</p>
    </div>
</div>

{{ super() }}

<script>
(function () {
    var LOGO_LIGHT = 'https://www.iot-lab.info/assets/images/slices-ri_black.png';
    var LOGO_DARK  = 'https://www.iot-lab.info/assets/images/slices-ri_white.png';

    function applyTheme(theme) {
        var img = document.getElementById('iotlab-logo');
        if (!img) return;
        img.src = theme === 'dark' ? LOGO_DARK : LOGO_LIGHT;
    }

    function currentTheme() {
        return document.documentElement.getAttribute('data-bs-theme') || 'light';
    }

    applyTheme(currentTheme());

    new MutationObserver(function () {
        applyTheme(currentTheme());
    }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-bs-theme'] });
})();
</script>

{% endblock %}

{% block stylesheet %}
{{ super() }}
<style>

.iotlab {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 24px 16px 16px;
    width: 100%;
}

#login-main {
    margin-top: 2%;
    height: 100%;
}

.iotlab .logo {
    margin-bottom: 20px;
}

.iotlab .logo img {
    display: block;
    width: 240px;
    max-width: 100%;
    height: auto;
}

.iotlab .welcome h2 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 8px;
}

.iotlab .welcome p {
    font-size: 0.95rem;
    margin: 4px 0;
}

[data-bs-theme="light"] .iotlab .welcome h2 {
    color: #444;
}

[data-bs-theme="light"] .iotlab .welcome p {
    color: #888;
}

[data-bs-theme="dark"] .iotlab .welcome h2 {
    color: #e8e8e8;
}

[data-bs-theme="dark"] .iotlab .welcome p {
    color: #aaa;
}

</style>
{% endblock %}
